<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETF Kurse</title>


<style>

body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
}


h1 {
    margin-bottom: 20px;
}


table {
    border-collapse: collapse;
    width: 100%;
    max-width: 1300px;
    background: white;
}


th, td {
    border: 1px solid #ddd;
    padding: 10px;
}


th {
    background: #e9ecef;
}


td.kurs {
    text-align: right;
    font-weight: bold;
}


td.zeit {
    white-space: nowrap;
}


.footer {
    margin-top: 10px;
    color: #666;
}

</style>

</head>


<body>


<h1>Aktuelle ETF-Kurse</h1>



<table>

<thead>

<tr>

<th>Anlage</th>
<th>ISIN</th>

<th style="display:none;">
ConsorsID
</th>

<th>Kurs Tagesanfang</th>
<th>Kurs</th>
<th>Tagesentwicklung</th>
<th>Zeitpunkt</th>

</tr>

</thead>



<tbody id="tableBody">

<tr>
<td colspan="6">
Lade Daten...
</td>
</tr>

</tbody>


</table>



<div class="footer" id="updateInfo"></div>



<script>


const isins = [

    {
        alias: "ETF Core MSCI World",
        isin: "IE00B4L5Y983"
    },

    {
        alias: "ETF MSCI World SRI",
        isin: "IE00BYX2JD69"
    },

    {
        alias: "Aktie Allianz",
        isin: "DE0008404005"
    },

    {
        alias: "ETF AI Infrastructure",
        isin: "IE000X59ZHE2"
    },

    {
        alias: "Fonds Allianz US Equity",
        isin: "LU0256843979"
    }

];





async function ladeTagesanfang(consorsId) {


    const url =
        "/api/chart/" + consorsId;


    const response =
        await fetch(url);


    if (!response.ok) {

        throw new Error(
            "Chart HTTP Fehler " +
            response.status
        );

    }


    const data =
        await response.json();


    try {

        return Number(
            data[0]
            .ChartHistoryV1
            .PERF_START_PRICE
        );

    }

    catch(e) {

        return null;

    }

}








async function ladeETF(isin) {


    const response =
        await fetch("/api/" + isin);


    if (!response.ok) {

        throw new Error(
            "HTTP Fehler " +
            response.status
        );

    }


    const result =
        await response.json();


    const data =
        result[0];





    let exchange =
        data.ExchangesV2.find(

            e =>
            e.CONSORS_EXCHANGE_CODE === "@_LUSG"

        );





    if (!exchange) {

        exchange =
        data.ExchangesV2.find(

            e =>
            e.CONSORS_EXCHANGE_CODE === "_TRO"

        );

    }






    if (!exchange) {

        throw new Error(
            "Kein Kurs gefunden"
        );

    }






    const consorsId =
        exchange.CONSORS_ID ??
        "nicht gefunden";





    let tagesanfang = null;



    if (consorsId !== "nicht gefunden") {


        try {

            tagesanfang =
                await ladeTagesanfang(consorsId);

        }

        catch(err) {

            console.warn(
                "Kein Tagesanfang:",
                isin,
                err
            );

        }

    }







    const kurs =
        Number(exchange.PRICE);




    let tagesentwicklung = null;



    if (tagesanfang !== null && tagesanfang !== 0) {


        tagesentwicklung =
            ((kurs - tagesanfang)
            / tagesanfang) * 100;

    }







    return {


        name:
        data.BasicV1.NAME_SECURITY_SHORT,


        isin,


        consorsId,


        tagesanfang,


        tagesentwicklung,


        kurs,



        zeit:
        exchange.DATETIME_PRICE


    };


}









function formatDatum(value) {


    const d =
        new Date(value);



    return d.toLocaleString(
        "de-DE",
        {

            day:"2-digit",
            month:"2-digit",
            year:"numeric",

            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"

        }

    );

}










async function ladeAlleKurse() {


    const tbody =
        document.getElementById("tableBody");



    tbody.innerHTML = "";





    for (const item of isins) {


        try {


            const etf =
                await ladeETF(item.isin);


            etf.alias =
                item.alias;





            tbody.innerHTML += `


<tr>


<td>
${etf.alias}
</td>


<td>
${etf.isin}
</td>



<td style="display:none;">
${etf.consorsId}
</td>



<td class="kurs">

${
etf.tagesanfang !== null
?
etf.tagesanfang.toFixed(3) + " €"
:
"-"
}

</td>





<td class="kurs">

${etf.kurs.toFixed(3)} €

</td>





<td class="kurs">


${
etf.tagesentwicklung === null ||
Math.abs(etf.tagesentwicklung) < 0.005

?

""

:

`

<span style="color:${etf.tagesentwicklung < 0 ? "red" : "green"}">

${etf.tagesentwicklung.toFixed(2)} %

</span>

`

}


</td>





<td class="zeit">

${formatDatum(etf.zeit)}

</td>



</tr>


`;




        }


        catch(err) {


            tbody.innerHTML += `


<tr>

<td colspan="6">

Fehler bei ${item.alias} (${item.isin}): 
${err.message}

</td>

</tr>


`;


            console.error(err);


        }


    }







    document.getElementById("updateInfo")
    .textContent =

    "Letzte Aktualisierung: " +
    new Date().toLocaleString("de-DE");

}








ladeAlleKurse();



// alle 60 Sekunden aktualisieren

setInterval(
    ladeAlleKurse,
    60000
);



</script>


</body>

</html>
