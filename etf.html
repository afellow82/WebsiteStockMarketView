<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETF Kurse</title>


<style>

body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
}


h1 {
    margin-bottom: 20px;
}


table {
    border-collapse: collapse;
    width: 100%;
    max-width: 1300px;
    background: white;
}


th, td {
    border: 1px solid #ddd;
    padding: 10px;
}


th {
    background: #e9ecef;
}


td.kurs {
    text-align: right;
    font-weight: bold;
}


td.zeit {
    white-space: nowrap;
}


.footer {
    margin-top: 10px;
    color: #666;
}

</style>

</head>


<body>


<h1>Aktuelle ETF-Kurse</h1>



<table>

<thead>

<tr>

<th>ETF</th>
<th>ISIN</th>
<th>ConsorsID</th>
<th>Tagesanfang (€)</th>
<th>Kurs (€)</th>
<th>Zeitpunkt</th>

</tr>

</thead>



<tbody id="tableBody">

<tr>
<td colspan="6">
Lade Daten...
</td>
</tr>

</tbody>


</table>


<div class="footer" id="updateInfo"></div>



<script>


const isins = [

    "IE00B4L5Y983",
    "IE00BYX2JD69",
    "DE0008404005",
    "IE000X59ZHE2",
    "LU0256843979"

];







// Tagesanfang über gleichen Proxy

async function ladeTagesanfang(consorsId) {


    const url =
        "/api/chart/" + consorsId;



    const response =
        await fetch(url);



    if (!response.ok) {

        throw new Error(
            "Chart HTTP Fehler " +
            response.status
        );

    }



    const data =
        await response.json();



    try {


        return Number(
            data[0]
            .ChartHistoryV1
            .PERF_START_PRICE
        );


    }

    catch(e) {

        return null;

    }

}








async function ladeETF(isin) {


    const response =
        await fetch("/api/" + isin);



    if (!response.ok) {

        throw new Error(
            "HTTP Fehler " +
            response.status
        );

    }



    const result =
        await response.json();



    const data =
        result[0];





    // Erst Lang & Schwarz

    let exchange =
        data.ExchangesV2.find(

            e =>
            e.CONSORS_EXCHANGE_CODE === "@_LUSG"

        );





    // sonst gettex

    if (!exchange) {

        exchange =
        data.ExchangesV2.find(

            e =>
            e.CONSORS_EXCHANGE_CODE === "_TRO"

        );

    }






    if (!exchange) {

        throw new Error(
            "Kein Kurs gefunden"
        );

    }






    const consorsId =
        exchange.CONSORS_ID ??
        "nicht gefunden";





    let tagesanfang = null;



    if (consorsId !== "nicht gefunden") {


        try {

            tagesanfang =
                await ladeTagesanfang(consorsId);

        }

        catch(err) {

            console.warn(
                "Kein Tagesanfang:",
                isin,
                err
            );

        }

    }






    return {


        name:
        data.BasicV1.NAME_SECURITY_SHORT,


        isin,


        consorsId,


        tagesanfang,



        kurs:
        Number(exchange.PRICE),


        zeit:
        exchange.DATETIME_PRICE


    };


}









function formatDatum(value) {


    const d =
        new Date(value);



    return d.toLocaleString(
        "de-DE",
        {

            day:"2-digit",
            month:"2-digit",
            year:"numeric",

            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"

        }

    );

}










async function ladeAlleKurse() {


    const tbody =
        document.getElementById("tableBody");



    tbody.innerHTML = "";





    for (const isin of isins) {


        try {


            const etf =
                await ladeETF(isin);





            tbody.innerHTML += `


<tr>


<td>
${etf.name}
</td>


<td>
${etf.isin}
</td>



<td>
${etf.consorsId}
</td>



<td class="kurs">

${
etf.tagesanfang !== null
?
etf.tagesanfang.toFixed(3)
:
"-"
}

</td>




<td class="kurs">

${etf.kurs.toFixed(3)}

</td>



<td class="zeit">

${formatDatum(etf.zeit)}

</td>



</tr>


`;




        }


        catch(err) {


            tbody.innerHTML += `


<tr>

<td colspan="6">

Fehler bei ${isin}: 
${err.message}

</td>

</tr>


`;


            console.error(err);


        }


    }







    document.getElementById("updateInfo")
    .textContent =

    "Letzte Aktualisierung: " +
    new Date().toLocaleString("de-DE");

}








ladeAlleKurse();



// alle 60 Sekunden aktualisieren

setInterval(
    ladeAlleKurse,
    60000
);



</script>


</body>

</html>
